# Gradle 8.14 no arranca su daemon sobre Java 25+ ("Unsupported class file major
# version"). Como el JDK por defecto de la máquina puede ser más nuevo, aquí se
# fija el JDK del daemon a 21, que es también el toolchain de compilación.
# Sin esto, `./gradlew` falla salvo que exportes JAVA_HOME a mano.
toolchainVersion=21
